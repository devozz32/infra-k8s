# ============================================
# Global Settings
# ============================================
# Note: namespace נקבע על ידי הפקודה של helm install/upgrade
# אין צורך להגדיר כאן.

# ============================================
# Image Registry & Tags
# ============================================
image:
  registry: docker.io/talko32
  pullPolicy: Always
  # ערכים אלו יוחלפו על ידי Jenkins בזמן פריסה
  frontendTag: latest
  backendTag: latest
  authTag: latest

# ============================================
# JWT Secret (injected from Jenkins)
# ============================================
jwtSecret:
  # ⚠️ הסוד מוזרק על ידי Jenkins
  key: ""

# ============================================
# Frontend Service (React + NGINX)
# ============================================
frontend:
  enabled: true
  name: frontend

  image:
    repository: store-frontend

  replicaCount: 2

  service:
    type: ClusterIP
    port: 80
    targetPort: 80

  ingress:
    enabled: true
    className: nginx
    host: jewelry-store.local
    path: /
    pathType: Prefix
    annotations: {}
    tls:
      enabled: false
      secretName: jewelry-store-tls

  persistence:
    enabled: true
    storageClass: standard
    accessMode: ReadWriteOnce
    size: 1Gi
    mountPath: /usr/share/nginx/html

  env:
    REACT_APP_API_BASE_URL: "http://backend-service:8000/api"
    REACT_APP_AUTH_BASE_URL: "http://auth-service:8001"
    REACT_APP_BACKEND_HOST: "backend-service"
    REACT_APP_BACKEND_PORT: "8000"

  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"

  livenessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 50
    targetMemoryUtilizationPercentage: 70

# ============================================
# Backend Service (FastAPI)
# ============================================
backend:
  enabled: true
  name: backend

  image:
    repository: store-backend

  replicaCount: 2

  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000

  env:
    AUTH_SERVICE_URL: "http://auth-service:8001"

  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "1000m"

  livenessProbe:
    httpGet:
      path: /
      port: 8000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /
      port: 8000
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 50
    targetMemoryUtilizationPercentage: 70

# ============================================
# Auth Service (FastAPI)
# ============================================
authService:
  enabled: true
  name: auth-service

  image:
    repository: store-auth

  replicaCount: 2

  service:
    type: ClusterIP
    port: 8001
    targetPort: 8001

  env: {}

  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "1000m"

  livenessProbe:
    httpGet:
      path: /
      port: 8001
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /
      port: 8001
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 50
    targetMemoryUtilizationPercentage: 70
