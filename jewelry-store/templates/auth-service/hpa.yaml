{{- if and .Values.authService.enabled .Values.authService.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.authService.name }}-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.authService.name }}-deployment
  minReplicas: {{ .Values.authService.hpa.minReplicas }}
  maxReplicas: {{ .Values.authService.hpa.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.authService.hpa.targetCPUUtilizationPercentage }}
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: {{ .Values.authService.hpa.targetMemoryUtilizationPercentage }}
{{- end }}
