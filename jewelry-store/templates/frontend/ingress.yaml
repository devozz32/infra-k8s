{{- if and .Values.frontend.enabled .Values.frontend.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.frontend.name }}-ingress
  {{- with .Values.frontend.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.frontend.ingress.className }}
  {{- if .Values.frontend.ingress.tls.enabled }}
  tls:
  - hosts:
    - {{ .Values.frontend.ingress.host }}
    secretName: {{ .Values.frontend.ingress.tls.secretName }}
  {{- end }}
  rules:
  - host: {{ .Values.frontend.ingress.host }}
    http:
      paths:
      - path: {{ .Values.frontend.ingress.path }}
        pathType: {{ .Values.frontend.ingress.pathType }}
        backend:
          service:
            name: {{ .Values.frontend.name }}-service
            port:
              number: {{ .Values.frontend.service.port }}
{{- end }}
