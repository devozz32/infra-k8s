{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.frontend.name }}-deployment
  labels:
    app: {{ .Values.frontend.name }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.frontend.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.frontend.name }}
    spec:
      containers:
      - name: frontend
        image: "{{ .Values.image.registry }}/{{ .Values.frontend.image.repository }}:{{ .Values.image.frontendTag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.frontend.service.targetPort }}
          name: http
          protocol: TCP
        
        # Environment Variables from ConfigMap (NO JWT!)
        envFrom:
        - configMapRef:
            name: {{ .Values.frontend.name }}-config
        
        {{- if .Values.frontend.persistence.enabled }}
        # Volume Mount for NGINX
        volumeMounts:
        - name: frontend-storage
          mountPath: {{ .Values.frontend.persistence.mountPath }}
        {{- end }}
        
        # Resource Limits
        resources:
          {{- toYaml .Values.frontend.resources | nindent 10 }}
        
        # Liveness Probe
        {{- with .Values.frontend.livenessProbe }}
        livenessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        
        # Readiness Probe
        {{- with .Values.frontend.readinessProbe }}
        readinessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      
      {{- if .Values.frontend.persistence.enabled }}
      # Volume Definition
      volumes:
      - name: frontend-storage
        persistentVolumeClaim:
          claimName: {{ .Values.frontend.name }}-pvc
      {{- end }}
{{- end }}
